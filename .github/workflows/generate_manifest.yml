name: Generate Asset Manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'manifest.json'

permissions:
  contents: write        # ← This is the key addition

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4      # ← Updated to v4 (fixes the Node.js warning too)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5  # ← Updated to v5
        with:
          python-version: '3.x'

      - name: Run manifest generator
        run: python generate_manifest.py

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "Auto-update manifest.json"
          git push
