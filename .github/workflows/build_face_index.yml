name: Build Face Index

on:
  push:
    branches:
      - main
    paths:
      - 'FaceSheets/**'
      - 'build_face_index.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build_face_index.py
        run: python build_face_index.py

      - name: Commit face_index.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add face_index.json
          git diff --cached --quiet || git commit -m "chore: rebuild face_index.json [skip ci]"
          git push
