name: Build Index

on:
  push:
    branches:
      - main
    paths:
      - 'Items/**'        # only runs when something inside Items/ changes
      - 'build_index.py'  # or when the script itself changes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build_index.py
        run: python build_index.py

      - name: Commit index.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          # Only commit if index.json actually changed
          git diff --cached --quiet || git commit -m "chore: rebuild index.json [skip ci]"
          git push
