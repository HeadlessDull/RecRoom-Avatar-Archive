name: Build Props Index

on:
  push:
    paths:
      - 'Props/**'
      - 'build_props_index.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build props_index.json
        run: python build_props_index.py
      - name: Commit props_index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add props_index.json
          git diff --cached --quiet || git commit -m "chore: rebuild props_index.json [skip ci]"
          git push
